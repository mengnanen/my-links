<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="王小二的个人网站收藏导航页">
  <title>王小二网站导航页</title>
  <link rel="icon" href="img/favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/sites.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="site-brand">
      <span class="terminal-mark" aria-hidden="true">&gt;_</span>
      <h1 class="site-title">王小二导航</h1>
    </div>

    <div class="site-status">
      <div class="status-greeting">
        <span id="greeting-text">你好</span>
        <span aria-hidden="true">👋</span>
      </div>
      <time class="local-time" id="local-time">--:--:--</time>
    </div>
  </header>

  <!-- 后续接入数据库后，可重新启用添加链接按钮。 -->
  <!-- <button class="add-button" id="add-link-button" aria-label="添加链接">✏️</button> -->

  <div class="top-controls">
    <nav class="category-tabs" id="category-tabs" aria-label="网站分类"></nav>

    <div class="search-bar">
      <input type="search" id="search-input" aria-label="搜索网站" title="搜索网站" placeholder="搜索你感兴趣的网站..." autocomplete="off">
    </div>
  </div>

  <main id="sections" aria-live="polite"></main>

  <div class="fixed-buttons">
    <button class="top-button" id="scroll-top-button" type="button" aria-label="返回顶部" title="返回顶部">
      <span class="icon-container">
        <img src="svg/dingduan.svg" alt="" width="24" height="24">
      </span>
    </button>

    <button class="toggle-mode-button" id="theme-button" type="button" aria-label="切换明暗模式" title="切换明暗模式">
      <span class="icon-container">
        <img id="theme-icon" src="svg/mingliang.svg" alt="">
      </span>
    </button>
  </div>

  <footer>
    <div class="footer-icons">
      <a href="https://github.com/mengnanen" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <img src="svg/github.svg" alt="">
      </a>
      <a href="https://t.me/ceshibot" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
        <img src="svg/telegram.svg" alt="">
      </a>
    </div>

    <div class="footer-copy">
      Copyright © 2025 王小二. All rights reserved. Made with Love.
    </div>
  </footer>

  <div id="password-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="password-modal-title">
    <div class="modal-box">
      <div class="modal-title" id="password-modal-title">🔒 输入密码查看加密内容</div>
      <input type="password" id="category-password" placeholder="请输入密码" autocomplete="current-password">
      <div class="modal-actions">
        <button id="cancel-password-button" type="button">取消</button>
        <button id="submit-password-button" type="button">确认</button>
      </div>
    </div>
  </div>
</body>
</html>
